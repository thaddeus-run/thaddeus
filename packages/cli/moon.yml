$schema: 'https://moonrepo.dev/schemas/project.json'

language: 'typescript'
layer: 'library'
tags: ['tsdown', 'publishable']

tasks:
  # Produce a self-contained `thaddeus` executable (no Bun at runtime) for the
  # HOST platform, under release/ (gitignored, and NOT in package.json `files`,
  # so the ~50MB binary never ships in the npm tarball). Cross-compile release
  # artifacts by adding a --target, e.g.
  #   bun build --compile --target=bun-linux-x64    --outfile release/thaddeus-linux-x64    src/bin.ts
  #   bun build --compile --target=bun-darwin-arm64 --outfile release/thaddeus-darwin-arm64 src/bin.ts
  #   bun build --compile --target=bun-windows-x64  --outfile release/thaddeus-windows-x64  src/bin.ts
  #
  # runInCI stays 'skip': the binary is a release artifact, not part of the test
  # lane (the compile smoke test builds its own throwaway binary). Run locally
  # with a `CI=` prefix in agent/CI shells: `CI= moon run cli:compile`.
  compile:
    command:
      'bun build --compile --minify --sourcemap --outfile release/thaddeus
      src/bin.ts'
    deps:
      - '^:build'
    inputs:
      - 'src/**/*'
      - 'package.json'
      - 'tsconfig.json'
    outputs:
      - 'release/thaddeus'
    options:
      runInCI: 'skip'
