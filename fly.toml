# Fly.io deploy for `thaddeus serve`. `fly launch --copy-config` (first time) or
# `fly deploy` builds the Dockerfile; a volume holds the durable substrate.
# Rename `app` and pick a region before deploying.
# Set a UNIQUE app name before deploying — `thaddeus` is taken, so `fly deploy`
# as-is will fail. Use `fly launch` (which picks/creates a name) or edit this.
app = "thaddeus-changeme"
primary_region = "fra"

[build]

[env]
# The server binds to $PORT. We use 8080 to match Fly's proxy default: a bare
# `fly launch` (and the web/GitHub Launch flow) forces internal_port = 8080
# regardless of this file, so pinning PORT to the same value keeps them in
# agreement however you deploy. Locally the container still defaults to 4000
# (see the Dockerfile) — it only binds 8080 when PORT says so.
PORT = "8080"
THADDEUS_DATA = "/data"
# THADDEUS_HOST = "1"          # uncomment to run an attesting instance (P07)
# THADDEUS_MIN_MERGES = "0"    # gate land on N attested merges per author

# One durable volume, mounted where the FileBackend + host identity live.
# Create it once: `fly volumes create thaddeus_data --size 3 --region fra`.
[[mounts]]
source = "thaddeus_data"
destination = "/data"

[http_service]
# fly-proxy routes here; it MUST equal the PORT env above (both 8080), or the
# proxy can't reach the app ("not listening on the expected address"). 8080 is
# Fly's default, so the Launch flow won't drift it. The container reads $PORT,
# so it binds 8080 here even though it defaults to 4000 for a local docker run.
internal_port = 8080
force_https = true # Fly terminates TLS at the edge
auto_stop_machines = "off" # the server is stateful — keep it running
auto_start_machines = true
min_machines_running = 1

# HTTP health check — restart the machine if the server stops answering
# (a TCP-only check misses a crashed HTTP handler). /repos always returns 200.
# grace_period lets the server boot + mint its identity before checks count.
[[http_service.checks]]
grace_period = "10s"
interval = "15s"
timeout = "2s"
method = "GET"
path = "/repos"

[[vm]]
size = "shared-cpu-1x"
memory = "512mb"
