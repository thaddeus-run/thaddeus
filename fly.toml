# fly.toml app configuration file generated for thaddeus on 2026-07-09T10:51:11Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'thaddeus'
primary_region = 'ams'

[build]

[env]
  PORT = '4000'
  THADDEUS_DATA = '/data'

[[mounts]]
  source = 'data'
  destination = '/data'

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = '15s'
    timeout = '2s'
    grace_period = '10s'
    method = 'GET'
    path = '/repos'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
