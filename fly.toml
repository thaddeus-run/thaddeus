# Fly.io deploy for the live `thaddeus` app. A volume holds the durable
# substrate; keep this config aligned with the existing volume in Amsterdam.
app = "thaddeus"
primary_region = "ams"

[build]

[env]
PORT = "4000"
THADDEUS_DATA = "/data"
THADDEUS_MAX_REQUEST_BODY_BYTES = "16777216"
# AWS_ROLE_ARN and THADDEUS_ATTESTATION_AWS_KMS_KEY_ARN are deploy-specific
# Fly secrets. Fly OIDC supplies short-lived AWS credentials at runtime.
# THADDEUS_MIN_MERGES = "0"    # gate land on N attested merges per author
# THADDEUS_TRUST_HOSTS = "did:key:...,did:key:..." # foreign attesting hosts

# Existing durable volume, mounted for the FileBackend substrate only.
# Do not create, rename, or migrate it: `data` is attached in `ams`.
[[mounts]]
source = "data"
destination = "/data"

[http_service]
# MUST match the container's port (Dockerfile EXPOSE + the PORT env, both 4000).
# A bare `fly launch` regenerates this file with Fly's default 8080 — keep it
# 4000, or fly-proxy can't reach the app ("not listening on the expected address").
internal_port = 4000
force_https = true # Fly terminates TLS at the edge
auto_stop_machines = "off" # the server is stateful — keep it running
auto_start_machines = true
min_machines_running = 1

# HTTP health check — restart the machine if the server stops answering
# (a TCP-only check misses a crashed HTTP handler). /repos always returns 200.
# grace_period lets the server validate KMS and load durable state before checks.
[[http_service.checks]]
grace_period = "10s"
interval = "15s"
timeout = "2s"
method = "GET"
path = "/repos"

[[vm]]
size = "shared-cpu-1x"
memory = "512mb"
