name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # moon's affected-detection needs full git history; a shallow
          # checkout makes `moon ci` fall back to running everything.
          fetch-depth: 0

      # proto installs the pinned bun/node/moon/gh from .prototools.
      - name: Install proto toolchain
        uses: moonrepo/setup-toolchain@v0
        with:
          auto-install: true

      - name: Install dependencies
        run: |
          # bunfig's minimumReleaseAge is a dev-machine supply-chain gate.
          # Against a frozen, reviewed lockfile it only risks blocking freshly
          # published pinned tool versions and producing a partial install on
          # the clean CI runner, so disable it for CI (GNU sed on the runner).
          sed -i 's/^minimumReleaseAge = .*/minimumReleaseAge = 0/' bunfig.toml
          bun install --frozen-lockfile

      # Gate the substrate packages only: build, typecheck, test. The scaffold
      # apps (docs, landing) and whole-repo lint are not gated yet — those
      # scaffolds are unfinished and tracked separately.
      - name: Build, typecheck, and test the substrate
        run: |
          moon run identity:build store:build theme:build
          moon run identity:typecheck store:typecheck integration:typecheck
          moon run identity:test store:test integration:test

  # The lazythad TUI (lazythad/) is a standalone Rust crate outside the moon/bun
  # graph, so it gets its own job: format, lint, and test with the toolchain
  # pinned in .prototools.
  lazythad:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust 1.95.0
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: '1.95.0'
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: lazythad
      - name: Format
        run: cargo fmt --manifest-path lazythad/Cargo.toml --check
      - name: Lint
        run:
          cargo clippy --manifest-path lazythad/Cargo.toml --all-targets -- -D
          warnings
      - name: Test
        run: cargo test --manifest-path lazythad/Cargo.toml
