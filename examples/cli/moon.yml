$schema: 'https://moonrepo.dev/schemas/project.json'

id: 'example-cli'
language: 'typescript'
layer: 'application'

tasks:
  test:
    args: '--pass-with-no-tests'
  demo:
    command: 'bun src/cli-demo.ts'
    deps:
      - '^:build'
    options:
      cache: false
      runInCI: 'skip'
  grant-demo:
    command: 'bun src/grant-demo.ts'
    deps:
      - '^:build'
    options:
      cache: false
      runInCI: 'skip'
